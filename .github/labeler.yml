area:cli:
  - changed-files:
      - any-glob-to-any-file:
          - "src/LocalTranscriber.Cli/**"

area:web:
  - changed-files:
      - any-glob-to-any-file:
          - "src/LocalTranscriber.Web/**"

area:docs:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - ".github/**/*.md"
          - ".github/ISSUE_TEMPLATE/**"

area:ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/dependabot.yml"
          - ".github/labeler.yml"
          - ".github/labels.yml"

area:infra:
  - changed-files:
      - any-glob-to-any-file:
          - ".editorconfig"
          - ".gitattributes"
          - ".gitignore"
          - "global.json"
